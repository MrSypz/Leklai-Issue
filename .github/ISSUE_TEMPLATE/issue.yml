name: Issue
description: File a bug report
title: "[Issue]: "
labels: ["triage"]

body:
  - type: markdown
    attributes:
      value: |
        **Please read before submitting**
        1) Fix time depends on severity (can't play the game vs small visual glitch).
        2) Please test on the latest mod version available on **Modrinth / CurseForge** before reporting.
        3) Reports may be closed if required info is missing.
        4) Fixes ship in the next version only — no backports to older versions.

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: What type of issue is this?
      options:
        - Compatibility
        - Crash
        - Not working well
        - Performance
    validations:
      required: true

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      description: Please confirm the following.
      options:
        - label: "I confirm I am using the latest mod version currently published on Modrinth / CurseForge."
          required: true
        - label: "I checked this box anyway without reading and acknowledge that this issue will be closed if this box is checked."
          required: false

  - type: input
    id: minecraft_version
    attributes:
      label: Minecraft version
      placeholder: "e.g. 1.20.1"
    validations:
      required: true

  - type: input
    id: mod_version
    attributes:
      label: Mod version (NOT Minecraft version)
      description: Do not write "latest" / "newest". Paste the exact mod version string.
      placeholder: "Paste the exact version shown on Modrinth/CurseForge"
    validations:
      required: true

  - type: textarea
    id: issue_description
    attributes:
      label: Description
      description: What is the problem?
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: input
    id: log_link
    attributes:
      label: Log or crash report link
      description: Upload to Gist (recommended) and paste the link here.
      placeholder: "https://gist.github.com/..."
    validations:
      required: true
